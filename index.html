<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Diário - Forja Fantasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .auto-expand { min-height: 40px; overflow: hidden; resize: none; }
        input[type="number"] { -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .modal-open { overflow: hidden; }
        .read-only-mode input, .read-only-mode select, .read-only-mode textarea { pointer-events: none; background-color: #f8fafc; border-color: #e2e8f0; }
        .read-only-mode .btn-dynamic { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div id="mainContainer" class="max-w-md mx-auto bg-white shadow-xl min-h-screen relative">
        <header class="p-6 text-center border-b border-blue-100 relative">
            <img src="https://images.tcdn.com.br/img/img_prod/750119/1751505538_logo_forja_fantasy__500px_sem_fundo.png" 
                 alt="Logo Forja Fantasy" class="h-24 mx-auto mb-2 object-contain">
            <h1 class="text-2xl font-bold text-blue-900 uppercase tracking-wide">Relatório Diário</h1>
            
            <button type="button" onclick="abrirHistorico()" class="mt-3 inline-flex items-center gap-1 text-blue-600 font-bold text-xs uppercase tracking-tighter border border-blue-200 px-3 py-1.5 rounded-full hover:bg-blue-50 transition-colors">
                🕒 Histórico de Relatórios
            </button>
        </header>

        <div id="editBanner" class="hidden bg-amber-50 border-b border-amber-200 p-3 flex justify-between items-center">
            <span class="text-amber-800 text-xs font-bold uppercase">Modo de Visualização</span>
            <button type="button" onclick="habilitarEdicao()" class="bg-amber-600 text-white px-3 py-1 rounded-md text-xs font-black hover:bg-amber-700">EDITAR</button>
        </div>

        <form id="reportForm" class="p-4 space-y-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-blue-900">Data</label>
                    <div class="flex gap-2 mt-1">
                        <input type="date" id="reportDate" required class="flex-1 p-2 border border-blue-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="button" onclick="setToday()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium text-sm hover:bg-blue-700">Hoje</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-blue-900">Colaborador</label>
                    <select id="collaboratorSelect" onchange="handleCollaboratorChange()" class="w-full mt-1 p-2 border border-blue-200 rounded-lg outline-none text-gray-700 focus:ring-2 focus:ring-blue-500">
                        <option value="">Carregando...</option>
                    </select>
                    <input type="text" id="otherCollaborator" placeholder="Digite seu nome" class="hidden w-full mt-2 p-2 border border-blue-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <section id="morningSection">
                <h2 class="text-lg font-black text-sky-600 mb-4 uppercase italic flex items-center gap-2">
                    <span class="w-2 h-6 bg-sky-400 rounded-full"></span> Manhã
                </h2>
                <div class="activities-container space-y-4" id="morningActivities"></div>
                <button type="button" onclick="addActivity('morning')" class="btn-dynamic mt-4 w-full py-2 border-2 border-dashed border-sky-300 text-sky-600 rounded-lg font-bold hover:bg-sky-50">+ Atividade</button>
            </section>

            <div class="py-6 flex items-center justify-center opacity-70">
                <div class="w-1/3 h-px bg-gradient-to-r from-transparent to-blue-400"></div>
                <div class="px-4 text-blue-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div class="w-1/3 h-px bg-gradient-to-l from-transparent to-blue-400"></div>
            </div>

            <section id="afternoonSection">
                <h2 class="text-lg font-black text-blue-900 mb-4 uppercase italic flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-900 rounded-full"></span> Tarde
                </h2>
                <div class="activities-container space-y-4" id="afternoonActivities"></div>
                <button type="button" onclick="addActivity('afternoon')" class="btn-dynamic mt-4 w-full py-2 border-2 border-dashed border-blue-800 text-blue-900 rounded-lg font-bold hover:bg-blue-50">+ Atividade</button>
            </section>

            <div class="pt-6 space-y-3">
                <button type="button" id="btnSalvarPlanilha" onclick="salvarNaPlanilha()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-blue-800 transition-transform active:scale-95">💾 Salvar relatório</button>
                
                <button type="button" id="btnWhatsapp" onclick="copyToWhatsapp()" class="hidden w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-green-700 transition-transform active:scale-95 flex items-center justify-center gap-2">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.18-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217s.231.005.332.01c.109.004.253-.041.397.303.145.346.491 1.197.535 1.284.044.087.073.188.014.303-.058.116-.087.188-.173.289l-.26.303c-.087.087-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824z"/></svg>
                    Copiar para WhatsApp
                </button>
            </div>
        </form>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 hidden z-[70] flex flex-col items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center">
            <svg class="animate-spin h-10 w-10 text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <h3 class="text-lg font-bold text-blue-900">Aguarde...</h3>
            <p class="text-sm text-gray-500 mt-1">A salvar o relatório na nuvem</p>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-black/60 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl flex flex-col max-h-[80vh]">
            <div class="p-5 border-b flex justify-between items-center">
                <h3 class="text-xl font-black text-blue-900">Histórico</h3>
                <button onclick="fecharHistorico()" class="text-gray-400 hover:text-red-500">✕</button>
            </div>
            <div id="historyList" class="overflow-y-auto p-4 space-y-3"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-900 text-white px-6 py-3 rounded-full opacity-0 pointer-events-none transition-all duration-300 z-50 shadow-2xl"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyxAfCPIFPgBQ6N_BsjbJLcEZHLusfq8tzJcuprqhkozmI3xnfch6FSam8Pxku8tLFsWw/exec";
        const ACTIVITY_OPTIONS = ["Pedidos embalados", "Cortes realizados", "Impressões", "Montagem de produtos e kits", "Etiquetagem de produtos", "Inserção no estoque", "Limpeza e organização do espaço", "Outra atividade"];
        const PLATFORMS = ['Shopee', 'Mercado Livre', 'Amazon', 'Tray', 'TikTok', 'Magalu', 'Outro'];
        const DRAFT_KEY = "forja_draft_report";

        document.getElementById('reportForm').addEventListener('input', saveDraft);
        document.getElementById('reportForm').addEventListener('change', saveDraft);

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const dataParam = params.get('data');
            const colabParam = params.get('colab');

            try {
                const response = await fetch(GAS_URL);
                const inicial = await response.json();
                
                const select = document.getElementById('collaboratorSelect');
                select.innerHTML = '<option value="">Selecione...</option>';
                
                if(inicial.collaborators && inicial.collaborators.length > 0) {
                    inicial.collaborators.forEach(nome => {
                        select.innerHTML += `<option value="${nome}">${nome}</option>`;
                    });
                }
                select.innerHTML += '<option value="Outro">Outro</option>';

                if (dataParam && colabParam && inicial.reports) {
                    const rel = inicial.reports.find(r => r["Data do Relatório"] === dataParam && r["Colaborador"] === colabParam);
                    if (rel) {
                        preencherFormulario(rel);
                        return; 
                    }
                } 
                
                if (!loadDraft()) {
                    setToday();
                    addActivity('morning');
                    addActivity('afternoon');
                }
                
            } catch (e) { 
                console.error("Erro ao carregar dados", e); 
                document.getElementById('collaboratorSelect').innerHTML = '<option value="">Erro ao carregar...</option><option value="Outro">Outro</option>';
                if (!loadDraft()) {
                    setToday();
                    addActivity('morning');
                    addActivity('afternoon');
                }
            }
        };

        // --- SISTEMA DE AUTO-SALVAMENTO (RASCUNHO) ---
        function saveDraft() {
            if (document.getElementById('reportForm').classList.contains('read-only-mode')) return;

            const extrairBlocos = (turn) => {
                const arr = [];
                document.getElementById(`${turn}Activities`).querySelectorAll('.activity-block').forEach(block => {
                    const type = block.querySelector('.activity-type').value;
                    if (!type) return;
                    const item = { type: type, vals: {} };
                    
                    if (type === "Pedidos embalados") {
                        block.querySelectorAll('.platforms-input').forEach(i => {
                            item.vals[i.dataset.platform] = i.value;
                        });
                    } else {
                        item.vals.desc = block.querySelector('.description-input')?.value || '';
                    }
                    arr.push(item);
                });
                return arr;
            };

            const draft = {
                date: document.getElementById('reportDate').value,
                colab: document.getElementById('collaboratorSelect').value,
                other: document.getElementById('otherCollaborator').value,
                morning: extrairBlocos('morning'),
                afternoon: extrairBlocos('afternoon')
            };
            
            localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
        }

        function loadDraft() {
            const draftStr = localStorage.getItem(DRAFT_KEY);
            if (!draftStr) return false;

            try {
                const draft = JSON.parse(draftStr);
                document.getElementById('reportDate').value = draft.date || '';
                
                const select = document.getElementById('collaboratorSelect');
                if (Array.from(select.options).some(o => o.value === draft.colab)) {
                    select.value = draft.colab;
                } else if (draft.colab === "Outro") {
                    select.value = "Outro";
                }
                
                document.getElementById('otherCollaborator').value = draft.other || '';
                handleCollaboratorChange();

                document.getElementById('morningActivities').innerHTML = "";
                document.getElementById('afternoonActivities').innerHTML = "";

                const carregarBlocos = (turn, dataArr) => {
                    if (!dataArr || dataArr.length === 0) return;
                    dataArr.forEach(item => {
                        const block = addActivity(turn, item.type);
                        if (item.type === "Pedidos embalados") {
                            for (let plat in item.vals) {
                                const input = block.querySelector(`input[data-platform="${plat}"]`);
                                if (input) input.value = item.vals[plat];
                            }
                        } else {
                            const ta = block.querySelector('.description-input');
                            if (ta) {
                                ta.value = item.vals.desc;
                                autoExpand(ta);
                            }
                        }
                    });
                };

                carregarBlocos('morning', draft.morning);
                carregarBlocos('afternoon', draft.afternoon);

                if(document.getElementById('morningActivities').children.length === 0) addActivity('morning');
                if(document.getElementById('afternoonActivities').children.length === 0) addActivity('afternoon');

                return true;
            } catch (e) {
                return false;
            }
        }

        function clearDraft() {
            localStorage.removeItem(DRAFT_KEY);
        }

        // --- SISTEMA DE FILTRO DE DROPDOWN ---
        function getUsedActivities(turn) {
            const container = document.getElementById(`${turn}Activities`);
            const selects = container.querySelectorAll('.activity-type');
            return Array.from(selects).map(s => s.value).filter(v => v !== "");
        }

        function refreshDropdowns(turn) {
            const container = document.getElementById(`${turn}Activities`);
            const selects = container.querySelectorAll('.activity-type');
            const usedValues = getUsedActivities(turn);

            selects.forEach(select => {
                const currentVal = select.value;
                let html = '<option value="">Selecione...</option>';
                
                ACTIVITY_OPTIONS.forEach(opt => {
                    if (opt === currentVal || !usedValues.includes(opt)) {
                        html += `<option value="${opt}">${opt}</option>`;
                    }
                });
                
                select.innerHTML = html;
                select.value = currentVal;
            });
        }

        function setToday() {
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
        }

        function addActivity(turn, selectedValue = null) {
            const used = getUsedActivities(turn);
            if (used.length >= ACTIVITY_OPTIONS.length) return; 

            const container = document.getElementById(`${turn}Activities`);
            const isMorning = turn === 'morning';
            const div = document.createElement('div');
            div.className = `p-4 ${isMorning ? 'bg-sky-50/50 border-sky-100' : 'bg-blue-50 border-blue-200'} rounded-xl border space-y-3 relative activity-block shadow-sm`;
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <label class="text-[10px] font-bold uppercase ${isMorning ? 'text-sky-400' : 'text-blue-400'}">Atividade</label>
                    <button type="button" onclick="const block = this.closest('.activity-block'); block.parentNode.removeChild(block); refreshDropdowns('${turn}'); saveDraft();" class="btn-dynamic text-gray-300 hover:text-red-500">✕</button>
                </div>
                <select onchange="handleActivityTypeChange(this, '${turn}')" class="activity-type w-full p-2 bg-white border rounded-lg text-sm text-gray-700 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Selecione...</option>
                </select>
                <div class="content-area hidden"></div>
            `;
            container.appendChild(div);
            refreshDropdowns(turn);

            if(selectedValue) {
                const select = div.querySelector('.activity-type');
                select.value = selectedValue;
                handleActivityTypeChange(select, turn);
            }
            return div;
        }

        function handleActivityTypeChange(select, turn) {
            const contentArea = select.parentElement.querySelector('.content-area');
            const value = select.value;
            
            refreshDropdowns(turn);

            if (!value) { contentArea.classList.add('hidden'); saveDraft(); return; }
            
            contentArea.classList.remove('hidden');
            if (value === "Pedidos embalados") {
                contentArea.innerHTML = `<div class="grid grid-cols-2 gap-2 mt-2">${PLATFORMS.map(plat => `<div class="bg-white p-2 rounded border border-blue-100"><label class="text-[9px] font-bold text-blue-400 uppercase block mb-1">${plat}</label><input type="number" data-platform="${plat}" placeholder="0" class="platforms-input w-full p-1 text-center font-bold outline-none border-b focus:border-blue-500"></div>`).join('')}</div>`;
            } else {
                contentArea.innerHTML = `<textarea placeholder="Detalhes..." class="description-input auto-expand w-full mt-2 p-2 bg-white border rounded-lg text-sm text-gray-600 outline-none focus:ring-2 focus:ring-blue-500" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>`;
            }
            saveDraft();
        }

        function autoExpand(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        async function salvarNaPlanilha() {
            const dateVal = document.getElementById('reportDate').value;
            const colabSelect = document.getElementById('collaboratorSelect').value;
            const colabName = colabSelect === "Outro" ? document.getElementById('otherCollaborator').value : colabSelect;

            if(!dateVal || !colabName) { alert("Preencha Data e Colaborador"); return; }

            const pin = prompt(`Olá ${colabName}, insira o seu PIN para confirmar o envio:`);
            if (!pin) return; 

            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('btnWhatsapp').classList.add('hidden'); 

            const payload = { 
                "Data do Relatório": dateVal, 
                "Colaborador": colabName,
                "PIN": pin 
            };

            const processTurn = (turn, sufixo) => {
                document.getElementById(`${turn}Activities`).querySelectorAll('.activity-block').forEach(block => {
                    const type = block.querySelector('.activity-type').value;
                    if(!type) return;
                    if(type === "Pedidos embalados") {
                        block.querySelectorAll('.platforms-input').forEach(i => {
                            const val = parseInt(i.value) || 0;
                            if(val > 0) payload[`${i.dataset.platform === 'Outro' ? 'Outros Canais' : i.dataset.platform} (${sufixo})`] = val;
                        });
                    } else {
                        payload[`${type} (${sufixo})`] = block.querySelector('.description-input')?.value || 'Realizado';
                    }
                });
            };
            processTurn('morning', 'manhã');
            processTurn('afternoon', 'tarde');

            try {
                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const res = await response.json();
                
                if (res.status && res.status.includes("Erro")) {
                    alert("❌ PIN Incorreto! A informação não foi salva. Tente novamente.");
                    document.getElementById('loadingOverlay').classList.add('hidden');
                } else {
                    showToast(res.status === "Atualizado" ? "Relatório Atualizado!" : "Salvo com sucesso!");
                    if(res.status === "Atualizado") habilitarModoVisualizacao();
                    
                    document.getElementById('btnWhatsapp').classList.remove('hidden');
                    document.getElementById('btnSalvarPlanilha').classList.add('hidden'); 
                    clearDraft();
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }
            } catch (e) { 
                alert("Erro de conexão com a folha de cálculo."); 
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        async function abrirHistorico() {
            const modal = document.getElementById('historyModal');
            const list = document.getElementById('historyList');
            modal.classList.remove('hidden');
            list.innerHTML = '<div class="text-center py-10 text-blue-600 animate-pulse">Buscando...</div>';
            
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                const relatorios = data.reports || [];
                
                if (relatorios.length === 0) {
                    list.innerHTML = '<div class="text-center py-10 text-gray-500">Nenhum relatório encontrado.</div>';
                    return;
                }

                list.innerHTML = relatorios.map(rel => `
                    <div onclick="abrirEmNovaAba('${rel["Data do Relatório"]}', '${rel["Colaborador"]}')" class="bg-slate-50 border p-4 rounded-xl cursor-pointer hover:bg-blue-50 transition-all active:scale-95">
                        <div class="text-blue-900 font-bold">${rel["Colaborador"]}</div>
                        <div class="text-xs text-gray-500">${rel["Data do Relatório"].split('-').reverse().join('/')}</div>
                    </div>
                `).join('');
            } catch (e) { list.innerHTML = "Erro ao carregar"; }
        }

        function abrirEmNovaAba(data, colab) {
            const url = `${window.location.origin}${window.location.pathname}?data=${data}&colab=${colab}`;
            window.open(url, '_blank');
            fecharHistorico();
        }

        function preencherFormulario(rel) {
            document.getElementById('reportDate').value = rel["Data do Relatório"];
            const select = document.getElementById('collaboratorSelect');
            if (Array.from(select.options).some(o => o.value === rel["Colaborador"])) {
                select.value = rel["Colaborador"];
            } else {
                select.value = "Outro";
                const other = document.getElementById('otherCollaborator');
                other.value = rel["Colaborador"];
                other.classList.remove('hidden');
            }
            document.getElementById('morningActivities').innerHTML = "";
            document.getElementById('afternoonActivities').innerHTML = "";
            
            const turnos = [{s: 'manhã', d: 'morning'}, {s: 'tarde', d: 'afternoon'}];
            turnos.forEach(t => {
                let hasP = false;
                PLATFORMS.forEach(p => { if(rel[`${p === 'Outro' ? 'Outros Canais' : p} (${t.s})`] > 0) hasP = true; });
                if(hasP) {
                    const b = addActivity(t.d, "Pedidos embalados");
                    PLATFORMS.forEach(p => {
                        const val = rel[`${p === 'Outro' ? 'Outros Canais' : p} (${t.s})`];
                        if(val) b.querySelector(`input[data-platform="${p}"]`).value = val;
                    });
                }
                ACTIVITY_OPTIONS.forEach(opt => {
                    if(opt === "Pedidos embalados") return;
                    const val = rel[`${opt} (${t.s})`];
                    if(val) {
                        const b = addActivity(t.d, opt);
                        b.querySelector('.description-input').value = val;
                    }
                });
            });
            habilitarModoVisualizacao();
        }

        function getDayOfWeek(dateString) {
            const days = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
            const parts = dateString.split('-');
            const date = new Date(parts[0], parts[1]-1, parts[2]);
            return days[date.getDay()];
        }

        function formatSection(turn) {
            const container = document.getElementById(`${turn}Activities`);
            const blocks = container.querySelectorAll('.activity-block');
            let sectionText = '';

            blocks.forEach(block => {
                const type = block.querySelector('.activity-type').value;
                if (!type) return;

                sectionText += `■ ${type.toUpperCase()}\n`;

                if (type === "Pedidos embalados") {
                    const platforms = block.querySelectorAll('.platforms-input');
                    let hasPlats = false;
                    platforms.forEach(p => {
                        const val = parseInt(p.value) || 0;
                        if(val > 0) {
                            sectionText += `- ${p.dataset.platform}: ${val}\n`;
                            hasPlats = true;
                        }
                    });
                    if(!hasPlats) sectionText += `- Nenhum pedido informado\n`;
                    sectionText += `\n`;
                } else {
                    const descEl = block.querySelector('.description-input');
                    const desc = descEl ? descEl.value : '';
                    
                    // CORREÇÃO: Utilizando a quebra de linha normal do Javascript (\n) para separar
                    let lines = desc.split('\n').filter(l => l.trim() !== '');
                    if (lines.length === 0) {
                        sectionText += `- Realizado\n\n`;
                    } else {
                        lines.forEach(l => {
                            let textLine = l.trim();
                            if (!textLine.startsWith('-')) textLine = '- ' + textLine;
                            sectionText += `${textLine}\n`;
                        });
                        sectionText += `\n`;
                    }
                }
            });
            return sectionText || "Não houve atividade neste turno\n\n";
        }

        function copyToWhatsapp() {
            const dateVal = document.getElementById('reportDate').value;
            const colabSelect = document.getElementById('collaboratorSelect').value;
            const colabName = colabSelect === "Outro" ? document.getElementById('otherCollaborator').value : colabSelect;

            let text = `*Data:* ${dateVal.split('-').reverse().join('/')}\n`;
            text += `*Dia:* ${getDayOfWeek(dateVal)}\n`;
            text += `*Colaborador:* ${colabName.toUpperCase()}\n`;
            text += `_________\n\n`;
            text += `*MANHÃ*\n`;
            text += formatSection('morning');
            text += `_________\n`;
            text += `*TARDE*\n`;
            text += formatSection('afternoon');

            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 99999);

            try {
                const successful = document.execCommand('copy');
                if (successful) showToast("Relatório copiado!");
            } catch (err) {
                alert("Erro ao copiar. Tente selecionar o texto manualmente.");
            }
            document.body.removeChild(textArea);
        }

        function fecharHistorico() { document.getElementById('historyModal').classList.add('hidden'); }
        
        function habilitarModoVisualizacao() { 
            document.getElementById('reportForm').classList.add('read-only-mode');
            document.getElementById('editBanner').classList.remove('hidden');
            document.getElementById('btnSalvarPlanilha').classList.add('hidden');
        }
        
        function habilitarEdicao() { 
            document.getElementById('reportForm').classList.remove('read-only-mode');
            document.getElementById('editBanner').classList.add('hidden');
            document.getElementById('btnSalvarPlanilha').classList.remove('hidden');
            document.getElementById('btnWhatsapp').classList.add('hidden'); 
        }
        
        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m;
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
        }
        
        function handleCollaboratorChange() {
            const s = document.getElementById('collaboratorSelect');
            const o = document.getElementById('otherCollaborator');
            s.value === "Outro" ? o.classList.remove('hidden') : o.classList.add('hidden');
            saveDraft();
        }
    </script>
</body>
</html>
